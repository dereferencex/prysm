name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-${{ runner.os }}

      - run: npm ci

      - run: npx expo prebuild --no-install

      - name: Increase Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g" >> android/gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - run: cd android && ./gradlew --no-daemon assembleRelease

      - name: Sign and Rename APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No keystore provided. APKs will remain unsigned." | tee -a "$GITHUB_STEP_SUMMARY"
            SIGN_APK=false
          else
            echo "Keystore found. Signing APKs." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"
            SIGN_APK=true
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p renamed-apks
          cd android/app/build/outputs/apk/release

          for apk in *.apk; do
            case "$apk" in
              *arm64-v8a*)   name="prysm-${VERSION}-arm64-v8a.apk" ;;
              *armeabi-v7a*) name="prysm-${VERSION}-armeabi-v7a.apk" ;;
              *universal*)   name="prysm-${VERSION}-universal.apk" ;;
              *)             name="prysm-${VERSION}.apk" ;;
            esac

            $ANDROID_HOME/build-tools/35.0.0/zipalign -f -p -v 4 \
              "$apk" "$GITHUB_WORKSPACE/renamed-apks/$name"

            if [ "$SIGN_APK" = true ]; then
              $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
                --ks "$GITHUB_WORKSPACE/release.keystore" \
                --ks-key-alias "$KEY_ALIAS" \
                --ks-pass pass:"$KEYSTORE_PASSWORD" \
                --key-pass pass:"$KEY_PASSWORD" \
                "$GITHUB_WORKSPACE/renamed-apks/$name"
            fi
          done

          echo "Final processed APKs:" | tee -a "$GITHUB_STEP_SUMMARY"
          ls -1 "$GITHUB_WORKSPACE/renamed-apks/" | tee -a "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: prysm-${{ github.ref_name }}
          path: renamed-apks/

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: renamed-apks/*.apk
